<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes bounce {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes blink {
      0%, 90%, 100% { ry: 8; }
      95% { ry: 2; }
    }
    @keyframes tailWag {
      0%, 100% { transform: rotate(0deg); transform-origin: 280px 200px; }
      50% { transform: rotate(15deg); transform-origin: 280px 200px; }
    }
    @keyframes earTwitch {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-8deg); }
    }
    
    .body { fill: #FFB6C1; stroke: #FF69B4; stroke-width: 2; }
    .ear { fill: #FF9FAA; stroke: #FF69B4; stroke-width: 1.5; }
    .eye { fill: white; stroke: #8B4513; stroke-width: 1; }
    .pupil { fill: #2C1810; }
    .nose { fill: #FF69B4; }
    .cheek { fill: #FFB7C5; opacity: 0.6; }
    .heart { fill: #FF3366; animation: bounce 0.6s ease-in-out infinite; }
    
    .click-area:hover .heart-group {
      animation: bounce 0.3s ease-in-out;
    }
    
    .click-text { font-family: 'Courier New', monospace; font-size: 14px; fill: #FF69B4; }
  </style>
  
  <g id="pet">
    <!-- Tail -->
    <path d="M280 200 L300 190 L295 210 L280 200" fill="#FF9FAA" stroke="#FF69B4" stroke-width="1.5">
      <animateTransform attributeName="transform" type="rotate" values="0;15;0" dur="1.2s" repeatCount="indefinite" additive="sum" from="280 200" to="280 200"/>
    </path>
    
    <!-- Body -->
    <ellipse cx="200" cy="180" rx="55" ry="45" class="body"/>
    
    <!-- Ears -->
    <path d="M155 140 L135 100 L165 120 Z" class="ear">
      <animateTransform attributeName="transform" type="rotate" values="-5;0;-5" dur="1.5s" repeatCount="indefinite" additive="sum" from="150 120" to="150 120"/>
    </path>
    <path d="M245 140 L265 100 L235 120 Z" class="ear">
      <animateTransform attributeName="transform" type="rotate" values="5;0;5" dur="1.5s" repeatCount="indefinite" additive="sum" from="250 120" to="250 120"/>
    </path>
    
    <!-- Face -->
    <ellipse cx="170" cy="170" rx="8" ry="10" class="eye">
      <animate attributeName="ry" values="10;2;10" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="230" cy="170" rx="8" ry="10" class="eye">
      <animate attributeName="ry" values="10;2;10" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <circle cx="170" cy="172" r="4" class="pupil"/>
    <circle cx="230" cy="172" r="4" class="pupil"/>
    
    <!-- Nose -->
    <ellipse cx="200" cy="190" rx="8" ry="6" class="nose"/>
    
    <!-- Cheeks -->
    <circle cx="150" cy="195" r="10" class="cheek"/>
    <circle cx="250" cy="195" r="10" class="cheek"/>
    
    <!-- Floating Heart -->
    <g class="heart-group">
      <path d="M200 130 L195 125 C185 115 185 100 200 105 C215 100 215 115 205 125 L200 130Z" class="heart" transform="translate(0,0)">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <text x="200" y="280" text-anchor="middle" class="click-text">🐾 click me! 🐾</text>
</svg>
