<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
    @keyframes tk1{0%,100%{opacity:.1}50%{opacity:1}}
    @keyframes tk2{0%,100%{opacity:.9}50%{opacity:.05}}
    @keyframes tk3{0%,100%{opacity:.3}60%{opacity:.95}}
    @keyframes shipBob{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}
    @keyframes fl{0%,100%{rx:18;opacity:.65}50%{rx:26;opacity:1}}
    @keyframes fli{0%,100%{rx:10;opacity:.8}50%{rx:15;opacity:1}}
    @keyframes b1{0%{transform:translateX(0px);opacity:1}100%{transform:translateX(560px);opacity:0}}
    @keyframes b2{0%{transform:translateX(0px);opacity:1}100%{transform:translateX(520px);opacity:0}}
    @keyframes b3{0%{transform:translateX(0px);opacity:1}100%{transform:translateX(540px);opacity:0}}
    @keyframes b4{0%{transform:translateX(0px);opacity:1}100%{transform:translateX(510px);opacity:0}}
    @keyframes eA{0%,100%{transform:translateX(440px) translateY(68px)}33%{transform:translateX(438px) translateY(58px)}66%{transform:translateX(442px) translateY(75px)}}
    @keyframes eB{0%,100%{transform:translateX(520px) translateY(130px)}50%{transform:translateX(518px) translateY(142px)}}
    @keyframes eC{0%,100%{transform:translateX(480px) translateY(185px)}40%{transform:translateX(482px) translateY(176px)}}
    @keyframes eD{0%,100%{transform:translateX(580px) translateY(95px)}50%{transform:translateX(578px) translateY(104px)}}
    @keyframes eE{0%,100%{transform:translateX(560px) translateY(170px)}33%{transform:translateX(562px) translateY(160px)}}
    @keyframes ex1a{0%{r:0;opacity:1}100%{r:26;opacity:0}}
    @keyframes ex1b{0%{r:0;opacity:.8}100%{r:18;opacity:0}}
    @keyframes ex2a{0%{r:0;opacity:1}100%{r:20;opacity:0}}
    @keyframes ex2b{0%{r:0;opacity:.8}100%{r:13;opacity:0}}
    @keyframes ex3a{0%{r:0;opacity:1}100%{r:22;opacity:0}}
    @keyframes ex4a{0%{r:0;opacity:1}100%{r:16;opacity:0}}
    @keyframes pl{0%,100%{opacity:.55}50%{opacity:.85}}
    @keyframes rot{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    @keyframes rotR{0%{transform:rotate(0deg)}100%{transform:rotate(-360deg)}}
    @keyframes hud{0%,100%{opacity:.6}50%{opacity:1}}
    @keyframes scan{0%{transform:translateY(-320px)}100%{transform:translateY(320px)}}
    @keyframes px1{0%{transform:translate(0,0);opacity:1}100%{transform:translate(18px,-22px);opacity:0}}
    @keyframes px2{0%{transform:translate(0,0);opacity:1}100%{transform:translate(-15px,-18px);opacity:0}}
    @keyframes px3{0%{transform:translate(0,0);opacity:1}100%{transform:translate(20px,15px);opacity:0}}
    @keyframes px4{0%{transform:translate(0,0);opacity:1}100%{transform:translate(-18px,20px);opacity:0}}
    @keyframes px5{0%{transform:translate(0,0);opacity:1}100%{transform:translate(12px,-25px);opacity:0}}
    @keyframes px6{0%{transform:translate(0,0);opacity:1}100%{transform:translate(-22px,10px);opacity:0}}
    @keyframes px7{0%{transform:translate(0,0);opacity:1}100%{transform:translate(25px,8px);opacity:0}}
    @keyframes px8{0%{transform:translate(0,0);opacity:1}100%{transform:translate(8px,24px);opacity:0}}
    @keyframes titleGlow{0%,100%{filter:drop-shadow(0 0 6px #ED93B1)}50%{filter:drop-shadow(0 0 18px #ED93B1)}}
    @keyframes badgePulse{0%,100%{opacity:.7}50%{opacity:1}}
    @keyframes termBlink{0%,49%{opacity:1}50%,100%{opacity:0}}
    .t1{animation:tk1 2.1s ease-in-out infinite}
    .t2{animation:tk2 1.7s ease-in-out infinite}
    .t3{animation:tk3 3s ease-in-out infinite .5s}
    .t4{animation:tk1 2.6s ease-in-out infinite 1s}
    .t5{animation:tk2 1.4s ease-in-out infinite .3s}
    .t6{animation:tk3 2.9s ease-in-out infinite .8s}
    .ship{animation:shipBob 3.2s ease-in-out infinite}
    .flame{animation:fl .3s ease-in-out infinite}
    .flamei{animation:fli .3s ease-in-out infinite}
    .bl1{animation:b1 1.5s linear infinite}
    .bl2{animation:b2 1.5s linear infinite .38s}
    .bl3{animation:b3 1.5s linear infinite .76s}
    .bl4{animation:b4 1.5s linear infinite 1.14s}
    .enemyA{animation:eA 3.2s ease-in-out infinite}
    .enemyB{animation:eB 2.6s ease-in-out infinite .4s}
    .enemyC{animation:eC 2.9s ease-in-out infinite .9s}
    .enemyD{animation:eD 3.5s ease-in-out infinite 1.3s}
    .enemyE{animation:eE 2.4s ease-in-out infinite .6s}
    .r1a{animation:ex1a 1.5s ease-out infinite}
    .r1b{animation:ex1b 1.5s ease-out infinite .1s}
    .r2a{animation:ex2a 1.5s ease-out infinite .38s}
    .r2b{animation:ex2b 1.5s ease-out infinite .48s}
    .r3a{animation:ex3a 1.5s ease-out infinite .76s}
    .r4a{animation:ex4a 1.5s ease-out infinite 1.14s}
    .planet{animation:pl 4s ease-in-out infinite}
    .ring1{animation:rot 12s linear infinite;transform-origin:610px 95px}
    .ring2{animation:rotR 18s linear infinite;transform-origin:610px 95px}
    .hud{animation:hud 2s ease-in-out infinite}
    .scanline{animation:scan 5s linear infinite;opacity:.03}
    .p1{animation:px1 1.5s ease-out infinite}
    .p2{animation:px2 1.5s ease-out infinite .1s}
    .p3{animation:px3 1.5s ease-out infinite .05s}
    .p4{animation:px4 1.5s ease-out infinite .08s}
    .p5{animation:px5 1.5s ease-out infinite .38s}
    .p6{animation:px6 1.5s ease-out infinite .48s}
    .p7{animation:px7 1.5s ease-out infinite .76s}
    .p8{animation:px8 1.5s ease-out infinite .86s}
    .repoTitle{animation:titleGlow 2.5s ease-in-out infinite}
    .badge{animation:badgePulse 3s ease-in-out infinite}
    .cursor{animation:termBlink 1.1s step-end infinite}
  </style>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0a0415"/>
    <stop offset="100%" stop-color="#0d0726"/>
  </linearGradient>
  <linearGradient id="dividerGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#3C3489" stop-opacity="0"/>
    <stop offset="30%" stop-color="#7F77DD" stop-opacity="0.7"/>
    <stop offset="70%" stop-color="#ED93B1" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#3C3489" stop-opacity="0"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
    <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

